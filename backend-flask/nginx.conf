# -----------------------------------------------------------------------------
# nginx.conf — Nginx reverse proxy for Flask + Gunicorn
# Place this file at /etc/nginx/sites-available/attendance
# Then: sudo ln -s /etc/nginx/sites-available/attendance /etc/nginx/sites-enabled/
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name your-droplet-ip-or-domain.com;

    # Redirect all HTTP to HTTPS (uncomment after setting up SSL with Certbot)
    # return 301 https://$host$request_uri;

    # Max upload size (for face photos / medical reports)
    client_max_body_size 15M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Serve uploaded files (medical reports) directly via Nginx
    location /uploads/ {
        alias /home/appuser/attendance-system/uploads/;
        internal;  # Only accessible via X-Accel-Redirect header
    }
}

