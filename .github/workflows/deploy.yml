name: Deploy Flask Backend to DigitalOcean

on:
  push:
    branches:
      - main
    paths:
      - 'backend-flask/**' # Only trigger when backend files change

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd ~/Attendence-System-FOC/backend-flask
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # Activate virtual environment (Uncomment and adjust if you use venv)
            # source venv/bin/activate
            
            # Install dependencies
            pip install -r requirements.txt
            
            # Restart the Flask application
            # Adjust this command depending on how you run your Flask app (e.g., systemd, gunicorn, pm2)
            # Example using systemd:
            # sudo systemctl restart flask-backend
            
            echo "Deployment successful!"
